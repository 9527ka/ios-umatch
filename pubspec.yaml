name: umatch
description: "UMatch — Football countdown app"
publish_to: 'none'

version: 1.0.1+3

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.2  # Keychain-backed device_id, 卸载重装存活
  webview_flutter: ^4.10.0
  webview_flutter_wkwebview: ^3.25.1  # iOS WKWebView 平台实现, 用于开启原生边缘滑动返回手势
  pointycastle: ^3.9.1
  url_launcher: ^6.3.1
  gal: ^2.3.0
  share_plus: ^10.0.0
  add_2_calendar: ^3.0.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  in_app_review: ^2.0.10
  home_widget: ^0.9.2
  image_picker: ^1.1.2          # 自定义提醒：从相册选 logo
  path_provider: ^2.1.4         # 持久化上传的 logo 文件到文档目录

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/brand/
    - assets/data/
    - assets/team_logos/
    - assets/comp_logos/
    - assets/player_photos/
    - assets/wallpapers/
